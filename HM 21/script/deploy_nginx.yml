---
- name: Setup Docker and Nginx on Amazon Linux 2
  hosts: webservers
  become: yes
  gather_facts: no
  tasks:
    - name: 1. Install Docker via Extras
      raw: amazon-linux-extras install docker -y

    - name: 2. Start and Enable Docker
      raw: systemctl enable docker.service --now

    - name: 3. Add ec2-user to Docker group
      raw: usermod -a -G docker ec2-user

    - name: 4. Install Docker Compose (v2)
      # This command downloads the binary and makes it executable
      raw: |
        curl -L "https://github.com/docker/compose/releases/latest/download/docker-compose-$(uname -s)-$(uname -m)" -o /usr/local/bin/docker-compose
        chmod +x /usr/local/bin/docker-compose

    - name: 5. Deploy Nginx with Docker Compose
      # We use a single multi-line raw command to avoid more JSON errors
      raw: |
        mkdir -p /home/ec2-user/nginx-app
        echo "services:
          nginx:
            image: nginx:latest
            ports:
              - '80:80'
            restart: always" > /home/ec2-user/nginx-app/docker-compose.yml
        /usr/local/bin/docker-compose -f /home/ec2-user/nginx-app/docker-compose.yml up -d